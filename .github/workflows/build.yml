name: Patch Migrate Test
run-name: Migrate all dnsmasq patches 2.90 → 2.93
on:
  workflow_dispatch:

jobs:
  patch-test:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch original patches from KuniJiwa/padavan sync-1
        run: |
          set -e
          git config --global advice.defaultBranchName false
          mkdir -p patches
          git init padavan-tmp
          cd padavan-tmp
          git remote add origin https://github.com/KuniJiwa/padavan.git
          git config core.sparseCheckout true
          echo "trunk/user/dnsmasq/" >> .git/info/sparse-checkout
          git pull origin sync-1 --depth=1
          cp trunk/user/dnsmasq/patches/*.patch ../patches/
          cd ..
          rm -rf padavan-tmp
          ls -la patches/

      - name: Define global env vars
        run: |
          echo "DNS_VER=2.93" >> $GITHUB_ENV
          echo "SRC_NAME=dnsmasq-${{ env.DNS_VER }}" >> $GITHUB_ENV
          echo "SRC_EXT=tar.xz" >> $GITHUB_ENV
          echo "SRC_URL=https://thekelleys.org.uk/dnsmasq/${{ env.SRC_NAME }}.${{ env.SRC_EXT }}" >> $GITHUB_ENV
          echo "SRC_SHA256=0C00D4E5C97C8306E5FB932B348B34269C9C29A0E7DF0E8E82958B407092BC19" >> $GITHUB_ENV

      - name: Download source archive & SHA256 integrity verify
        run: |
          set -e
          echo "SRC_NAME = ${{ env.SRC_NAME }}"
          echo "SRC_FILE = ${{ env.SRC_NAME }}.${{ env.SRC_EXT }}"
          wget --retry-connrefused --waitretry=3 --timeout=15 "${{ env.SRC_URL }}"
          echo "${{ env.SRC_SHA256 }}  ${{ env.SRC_NAME }}.${{ env.SRC_EXT }}" | sha256sum -c -
          tar -Jtf "${{ env.SRC_NAME }}.${{ env.SRC_EXT }}" > /dev/null
          tar -Jxf "${{ env.SRC_NAME }}.${{ env.SRC_EXT }}"
          cp -r "${{ env.SRC_NAME }}" "${{ env.SRC_NAME }}.orig"
          test -d "${{ env.SRC_NAME }}/src" || exit 1

      - name: Apply patches sorted by filename
        run: |
          set +e
          cd "${{ env.SRC_NAME }}"
          echo "# Patch Apply Summary Report" > ../patch_summary.log
          echo "Start time: $(date)" >> ../patch_summary.log
          echo "Source archive SHA256: ${{ env.SRC_SHA256 }}" >> ../patch_summary.log
          echo "" >> ../patch_summary.log

          SUCCESS_LIST=()
          FAIL_LIST=()
          mapfile -t PATCHES < <(ls -1 ../patches/*.patch 2>/dev/null | sort)

          if [[ ${#PATCHES[@]} -eq 0 ]]; then
            echo "ERROR: No patch files found!" >> ../patch_summary.log
            exit 1
          fi

          for PATCH in "${PATCHES[@]}"; do
            PATCH_NAME=$(basename "${PATCH}")
            LOG_FILE="../log-${PATCH_NAME}.log"
            echo "=================================================="
            echo "Applying: ${PATCH_NAME}"
            echo "==================================================" >> ../patch_summary.log
            echo "Patch: ${PATCH_NAME}" >> ../patch_summary.log

            patch -p1 --dry-run < "${PATCH}" > "${LOG_FILE}" 2>&1
            patch -p1 --no-backup-if-mismatch < "${PATCH}" >> "${LOG_FILE}" 2>&1
            APPLY_RC=$?

            if [[ ${APPLY_RC} -eq 0 ]]; then
              echo "✅ SUCCESS: ${PATCH_NAME}"
              echo "Status: SUCCESS" >> ../patch_summary.log
              SUCCESS_LIST+=("${PATCH_NAME}")
            else
              echo "❌ FAILED/CONFLICT: ${PATCH_NAME}"
              echo "Status: FAILED / CONFLICT" >> ../patch_summary.log
              FAIL_LIST+=("${PATCH_NAME}")
            fi
            echo "" >> ../patch_summary.log
          done

          echo "==================== FINAL STATISTICS ====================" >> ../patch_summary.log
          echo "Total patches: ${#PATCHES[@]}" >> ../patch_summary.log
          echo "Success count: ${#SUCCESS_LIST[@]}" >> ../patch_summary.log
          echo "Fail/Conflict count: ${#FAIL_LIST[@]}" >> ../patch_summary.log
          echo "" >> ../patch_summary.log

          if [[ ${#SUCCESS_LIST[@]} -gt 0 ]]; then
            echo "Success list:" >> ../patch_summary.log
            printf ' - %s\n' "${SUCCESS_LIST[@]}" >> ../patch_summary.log
          fi
          if [[ ${#FAIL_LIST[@]} -gt 0 ]]; then
            echo "" >> ../patch_summary.log
            echo "Failed / Conflict list:" >> ../patch_summary.log
            printf ' - %s\n' "${FAIL_LIST[@]}" >> ../patch_summary.log
          fi
          cd ..

      - name: Scan all *.rej conflict files
        id: conflict_scan
        run: |
          echo "==================== CONFLICT SCAN RESULT ===================="
          REJ_FILES=$(find "${{ env.SRC_NAME }}" -type f -name "*.rej")
          echo "${REJ_FILES}" > conflict_list.txt

          if [[ -z "${REJ_FILES}" ]]; then
            echo "✅ No .rej conflict files found"
            echo "has_conflict=false" >> $GITHUB_ENV
          else
            echo "❌ Detected conflict .rej files:"
            echo "${REJ_FILES}"
            echo "has_conflict=true" >> $GITHUB_ENV
            for f in ${REJ_FILES}; do
              echo "------------------------------------------------"
              echo "Conflict file: $f"
              head -20 "$f"
            done
          fi

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patch-test-output
          path: |
            *.log
            *.txt
            patches/
            ${{ env.SRC_NAME }}/
            ${{ env.SRC_NAME }}.orig/
          retention-days: 14

      - name: Output final summary
        run: |
          cat patch_summary.log
          if [[ "${{ env.has_conflict }}" == "true" ]]; then
            echo "::warning::存在补丁冲突，请下载artifact查看 *.rej 和独立补丁日志"
          else
            echo "::success::🎉 全部补丁应用无冲突"
          fi
