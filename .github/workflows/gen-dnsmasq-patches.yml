name: Generate and verify dnsmasq patches

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create patches directory
        run: mkdir -p trunk/user/dnsmasq-2.93/patches

      - name: Generate 001 patch
        run: |
          cd trunk/user/dnsmasq-2.93
          # 001：把 6 个 commit 逐个拿出来合并成一个补丁
          git format-patch -1 72bd13f --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/001-dnsmasq-orig.patch 2>/dev/null || true
          git format-patch -1 5a5714d --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/001-dnsmasq-orig.patch 2>/dev/null || true
          git format-patch -1 c511176 --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/001-dnsmasq-orig.patch 2>/dev/null || true
          git format-patch -1 a53c300 --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/001-dnsmasq-orig.patch 2>/dev/null || true
          git format-patch -1 6ea747b --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/001-dnsmasq-orig.patch 2>/dev/null || true
          git format-patch -1 b238c92 --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/001-dnsmasq-orig.patch 2>/dev/null || true

      - name: Generate 100 patch
        run: |
          cd trunk/user/dnsmasq-2.93
          # 100：把 4 个 commit 逐个拿出来合并成一个补丁
          git format-patch -1 0b406b7 --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/100-remove-old-runtime-kernel-support.patch 2>/dev/null || true
          git format-patch -1 9fc8049 --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/100-remove-old-runtime-kernel-support.patch 2>/dev/null || true
          git format-patch -1 098a42b --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/100-remove-old-runtime-kernel-support.patch 2>/dev/null || true
          git format-patch -1 3824e09 --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/100-remove-old-runtime-kernel-support.patch 2>/dev/null || true

      - name: Generate 112 patch
        run: |
          cd trunk/user/dnsmasq-2.93
          # 112：把 24 个 commit 逐个拿出来合并成一个补丁
          for commit in 7439642 45177e2 cf9ad23 47d1045 59a431a abf2632 6828486 1b04903 891b4e7 58c8a4b 25c8403 f51ab0a 3ce94c9 922e750 4ee6e3f 87b7df4 8dc5424 4d84ab8 af4dc68 f6b1019 7407d55 0b19552 ed90a5f 3c515c0; do
            git format-patch -1 $commit --stdout --relative=trunk/user/dnsmasq-2.93 >> patches/112-add-back-ability-to-compile-without-IPv6-support.patch 2>/dev/null || true
          done

      - name: Generate 200 patch
        run: |
          cd trunk/user/dnsmasq-2.93
          git format-patch -1 48ffcdd --stdout --relative=trunk/user/dnsmasq-2.93 > patches/200-set-MAX_PROCS-to-4-to-reduce-memory-usage.patch

      - name: Download official dnsmasq 2.93 source
        run: |
          wget https://thekelleys.org.uk/dnsmasq/dnsmasq-2.93.tar.xz -O /tmp/dnsmasq-2.93.tar.xz
          tar -xf /tmp/dnsmasq-2.93.tar.xz -C /tmp
          cp -r /tmp/dnsmasq-2.93 /tmp/dnsmasq-2.93-test

      - name: Apply patches and collect results
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          cd /tmp/dnsmasq-2.93-test
          mkdir -p /tmp/patch-results
          {
            echo "=== PATCH APPLICATION LOG ==="
            echo "Start: $(date)"
            echo ""
            for PATCH in 001-dnsmasq-orig.patch 100-remove-old-runtime-kernel-support.patch 112-add-back-ability-to-compile-without-IPv6-support.patch 200-set-MAX_PROCS-to-4-to-reduce-memory-usage.patch; do
              echo "=== Applying ${PATCH} ==="
              patch -p1 --fuzz=3 < "${{ github.workspace }}/trunk/user/dnsmasq-2.93/patches/${PATCH}" 2>&1 || true
              echo ""
            done
            echo "=== REJECT FILES ==="
            find . -name "*.rej" -print
            find . -name "*.rej" -exec cp --parents {} /tmp/patch-results/ \; 2>/dev/null || true
            echo ""
            REJ_COUNT=$(find . -name "*.rej" | wc -l)
            if [ ${REJ_COUNT} -eq 0 ]; then
              echo "=== STATUS: SUCCESS ==="
            else
              echo "=== STATUS: FAILED - ${REJ_COUNT} reject(s) ==="
            fi
            echo "End: $(date)"
          } | tee /tmp/patch-results/patch-apply.log

      - name: Prepare single artifact
        run: |
          mkdir -p artifact/patches artifact/logs
          cp trunk/user/dnsmasq-2.93/patches/*.patch artifact/patches/
          cp -r /tmp/patch-results/* artifact/logs/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnsmasq-artifact
          path: artifact/
