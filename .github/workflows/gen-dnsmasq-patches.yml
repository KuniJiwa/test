name: Generate and verify dnsmasq patches

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create patches directory
        run: mkdir -p trunk/user/dnsmasq-2.93/patches

      - name: Generate 001 patches (6 commits)
        run: |
          cd trunk/user/dnsmasq-2.93
          count=1
          for commit in 72bd13f 5a5714d c511176 a53c300 6ea747b b238c92; do
            git format-patch -1 $commit --stdout > patches/001-$(printf "%02d" $count)-${commit}.patch
            count=$((count+1))
          done

      - name: Generate 100 patches (4 commits)
        run: |
          cd trunk/user/dnsmasq-2.93
          count=1
          for commit in 0b406b7 9fc8049 098a42b 3824e09; do
            git format-patch -1 $commit --stdout > patches/100-$(printf "%02d" $count)-${commit}.patch
            count=$((count+1))
          done

      - name: Generate 112 patches (24 commits)
        run: |
          cd trunk/user/dnsmasq-2.93
          count=1
          for commit in 7439642 45177e2 cf9ad23 47d1045 59a431a abf2632 6828486 1b04903 891b4e7 58c8a4b 25c8403 f51ab0a 3ce94c9 922e750 4ee6e3f 87b7df4 8dc5424 4d84ab8 af4dc68 f6b1019 7407d55 0b19552 ed90a5f 3c515c0; do
            git format-patch -1 $commit --stdout > patches/112-$(printf "%02d" $count)-${commit}.patch
            count=$((count+1))
          done

      - name: Generate 200 patches (1 commit)
        run: |
          cd trunk/user/dnsmasq-2.93
          git format-patch -1 48ffcdd --stdout > patches/200-01-48ffcdd.patch

      - name: Download official dnsmasq 2.93 source
        run: |
          wget https://thekelleys.org.uk/dnsmasq/dnsmasq-2.93.tar.xz -O /tmp/dnsmasq-2.93.tar.xz
          tar -xf /tmp/dnsmasq-2.93.tar.xz -C /tmp
          cp -r /tmp/dnsmasq-2.93 /tmp/dnsmasq-2.93-test

      - name: Apply patches and collect results
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          cd /tmp/dnsmasq-2.93-test
          mkdir -p /tmp/patch-results
          {
            echo "=== PATCH APPLICATION LOG ==="
            echo "Start: $(date)"
            echo ""
            for PREFIX in 001 100 112 200; do
              echo "=== Applying ${PREFIX} patches ==="
              for f in ${{ github.workspace }}/trunk/user/dnsmasq-2.93/patches/${PREFIX}-*.patch; do
                echo "Applying: $(basename $f)"
                patch -N -p1 < "$f" 2>&1 || true
                echo ""
              done
            done
            echo "=== REJECT FILES ==="
            find . -name "*.rej" -print
            find . -name "*.rej" -exec cp --parents {} /tmp/patch-results/ \; 2>/dev/null || true
            echo ""
            REJ_COUNT=$(find . -name "*.rej" | wc -l)
            echo "=== STATUS: $([ ${REJ_COUNT} -eq 0 ] && echo SUCCESS || echo FAILED - ${REJ_COUNT} reject(s)) ==="
            echo "End: $(date)"
          } | tee /tmp/patch-results/patch-apply.log

      - name: Upload patches
        uses: actions/upload-artifact@v4
        with:
          name: dnsmasq-patches
          path: trunk/user/dnsmasq-2.93/patches/*.patch

      - name: Upload verification logs and rejects
        uses: actions/upload-artifact@v4
        with:
          name: verify-logs
          path: /tmp/patch-results/
